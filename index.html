<!DOCTYPE html>
<html lang="id">
<head>

    <title>Moyhaz Network | Digital Store</title>

        </div>

    <div class="grid-container">
        <div class="card"><img><h3>Foto 1</h3></div>

        <div class="card"><img><h3>Foto 3</h3></div>
        <div class="card"><img><h3>Foto 4</h3></div>
        <div class="card"><img><h3>Foto 5</h3></div>
    </div>

    <div class="contact-box">
        <img src="URL_FOTO_LEBAR" class="contact-img">
        <p>Telegram: <a href="#">Click Here</a></p>
        <p>WhatsApp: <a href="#">Click Here</a></p>

    <footer class="footer">@ Hazsly Store - Digital</footer>

</html>
